app:
  name: News Aggregator API
  version: "1.0.0"
  description: >
    A FastAPI-based news aggregation service that fetches, filters,
    and caches live news from NewsAPI.org.

server:
  host: "0.0.0.0"
  port: 8000
  reload: true

newsapi:
  base_url: "https://newsapi.org/v2"
  default_country: "us"
  default_language: "en"
  default_page_size: 10
  max_page_size: 20

cache:
  ttl_seconds: 300  # 5 minutes
  max_size: 1000    # max cached items

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
